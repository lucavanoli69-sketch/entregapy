{% extends "base.html" %}

{% block titulo %}Crear Post{% endblock %}

{% block contenido %}
<div class="form-container">
    <h1>📝 Crear Nuevo Post</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn">Publicar Post</button>
        <a href="{% url 'home' %}" class="btn" style="background:#888; margin-left:10px;">Cancelar</a>
    </form>
</div>
{% endblock %}
