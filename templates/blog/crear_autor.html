{% extends "base.html" %}
<!-- Hereda la estructura base con navbar -->

{% block titulo %}Crear Autor{% endblock %}

{% block contenido %}
<div class="form-container">
    <h1>✍️ Crear Nuevo Autor</h1>

    <!-- Formulario que envía datos al mismo URL por POST -->
    <form method="post">
        {% csrf_token %}  <!-- Token de seguridad obligatorio en Django -->
        
        <!-- Django renderiza los campos del formulario automáticamente -->
        {{ form.as_p }}
        
        <button type="submit" class="btn">Guardar Autor</button>
        <a href="{% url 'home' %}" class="btn" style="background:#888; margin-left:10px;">Cancelar</a>
    </form>
</div>
{% endblock %}
